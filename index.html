<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#0f1117;--bg-secondary:#1a1d27;--bg-card:#222636;--bg-hover:#2a2f42;
--text-primary:#e8eaf0;--text-secondary:#9ea3b5;--text-muted:#6b7085;
--accent-blue:#4a9eff;--accent-purple:#8b5cf6;--accent-teal:#14b8a6;--accent-amber:#f59e0b;
--accent-rose:#f43f5e;--accent-green:#22c55e;--accent-indigo:#6366f1;
--border:#2e3348;--border-light:#3a3f55;
--radius:8px;--radius-lg:12px;
}
body{font-family:'Roboto',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100vh}
a{color:var(--accent-blue);text-decoration:none}
/* Layout */
.app-header{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.app-header h1 span{color:var(--accent-blue)}
.header-meta{font-size:12px;color:var(--text-muted)}
.nav-tabs{display:flex;gap:0;background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:0 32px;overflow-x:auto}
.nav-tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;user-select:none}
.nav-tab:hover{color:var(--text-primary);background:var(--bg-hover)}
.nav-tab.active{color:var(--accent-blue);border-bottom-color:var(--accent-blue)}
.main-content{padding:24px 32px;max-width:1600px;margin:0 auto}
.view{display:none}.view.active{display:block}
/* Cards & Grid */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.stat-card .stat-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-card .stat-value{font-size:28px;font-weight:700}
.stat-card .stat-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:border-color .2s}
.card:hover{border-color:var(--border-light)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-title{font-size:15px;font-weight:600}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-t1{background:rgba(74,158,255,0.15);color:var(--accent-blue)}
.badge-t2{background:rgba(139,92,246,0.15);color:var(--accent-purple)}
.badge-t3{background:rgba(107,112,133,0.15);color:var(--text-muted)}
.badge-active{background:rgba(34,197,94,0.15);color:var(--accent-green)}
.badge-prospect{background:rgba(245,158,11,0.15);color:var(--accent-amber)}
.badge-paused{background:rgba(244,63,94,0.15);color:var(--accent-rose)}
.score-bar{display:flex;align-items:center;gap:8px;margin-top:8px}
.score-dots{display:flex;gap:2px}
.score-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.score-dot.filled{background:var(--accent-blue)}
.score-dot.high{background:var(--accent-green)}
/* Section headers */
.section-header{display:flex;justify-content:space-between;align-items:center;margin:32px 0 16px}
.section-header:first-child{margin-top:0}
.section-title{font-size:18px;font-weight:600}
.section-subtitle{font-size:13px;color:var(--text-secondary)}
/* Table */
.table-container{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-controls{padding:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border)}
.search-input{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text-primary);font-family:'Roboto',sans-serif;font-size:13px;width:240px}
.search-input:focus{outline:none;border-color:var(--accent-blue)}
.filter-select{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text-primary);font-family:'Roboto',sans-serif;font-size:13px;cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--accent-blue)}
.range-group{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary)}
.range-group input[type=range]{width:100px;accent-color:var(--accent-blue)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text-primary)}
th .sort-icon{margin-left:4px;opacity:0.4}
th.sorted .sort-icon{opacity:1;color:var(--accent-blue)}
td{padding:10px 16px;font-size:13px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--bg-hover)}
tr.expandable{cursor:pointer}
.expand-row{display:none}
.expand-row.open{display:table-row}
.expand-row td{background:var(--bg-secondary);padding:16px 24px}
.expand-content{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.expand-field{margin-bottom:8px}
.expand-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.expand-value{font-size:13px;color:var(--text-primary)}
.table-footer{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border)}
/* Heatmap */
.heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.heatmap-cell{padding:16px 12px;border-radius:var(--radius);text-align:center;cursor:pointer;transition:transform .15s}
.heatmap-cell:hover{transform:scale(1.03)}
.heatmap-cell .cell-count{font-size:24px;font-weight:700;margin-bottom:2px}
.heatmap-cell .cell-label{font-size:11px;opacity:0.85}
/* Competitor */
.threat-meter{display:flex;gap:2px;align-items:center}
.threat-bar{width:12px;height:6px;border-radius:2px;background:var(--border)}
.threat-bar.filled-low{background:var(--accent-green)}
.threat-bar.filled-med{background:var(--accent-amber)}
.threat-bar.filled-high{background:var(--accent-rose)}
/* Product grid */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.product-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:all .2s}
.product-card:hover{border-color:var(--accent-blue);transform:translateY(-2px)}
.product-card.selected{border-color:var(--accent-blue);box-shadow:0 0 0 1px var(--accent-blue)}
.product-category-tag{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
.cat-consumer{background:rgba(74,158,255,0.15);color:var(--accent-blue)}
.cat-provider{background:rgba(139,92,246,0.15);color:var(--accent-purple)}
.cat-network{background:rgba(20,184,166,0.15);color:var(--accent-teal)}
.cat-data{background:rgba(245,158,11,0.15);color:var(--accent-amber)}
/* Pitch */
.pitch-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.pitch-section{margin-bottom:16px}
.pitch-section:last-child{margin-bottom:0}
.pitch-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.pitch-text{font-size:14px;line-height:1.7}
.pitch-quick{background:var(--bg-secondary);border-left:3px solid var(--accent-blue);padding:16px;border-radius:0 var(--radius) var(--radius) 0;font-size:14px;line-height:1.7;margin-top:8px}
/* Pipeline */
.pipeline-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}
.pipeline-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pipeline-config{font-size:12px;color:var(--text-secondary);margin-bottom:8px}
.pipeline-meta{display:flex;gap:24px;font-size:12px;color:var(--text-muted)}
/* Responsive */
@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
.main-content{padding:16px}
.nav-tabs{padding:0 16px}
.app-header{padding:12px 16px}
.table-controls{flex-direction:column;align-items:stretch}
.search-input{width:100%}
.expand-content{grid-template-columns:1fr}
}
@media print{
.nav-tabs,.table-controls,.app-header{display:none!important}
.view{display:block!important}
body{background:#fff;color:#000}
.stat-card,.card,.table-container,.pipeline-card,.pitch-card,.product-card{border:1px solid #ccc;background:#fff}
.stat-card .stat-label,.section-title,.card-title,.pitch-label,.expand-label{color:#333}
}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}
/* Matrix */
.matrix-container{overflow-x:auto}
.matrix-table{border-collapse:collapse;font-size:12px}
.matrix-table th,.matrix-table td{padding:8px 10px;border:1px solid var(--border);text-align:center;min-width:80px}
.matrix-table th{background:var(--bg-secondary);color:var(--text-secondary);font-weight:500}
.matrix-table td.has-match{background:rgba(74,158,255,0.12);color:var(--accent-blue);font-weight:500}
.matrix-table td.row-label{text-align:left;font-weight:500;color:var(--text-primary);background:var(--bg-secondary);position:sticky;left:0;min-width:160px}
/* Insight callout */
.insight-box{background:var(--bg-secondary);border:1px solid var(--accent-blue);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px}
.insight-box .insight-title{font-size:13px;font-weight:600;color:var(--accent-blue);margin-bottom:4px}
.insight-box .insight-text{font-size:13px;color:var(--text-secondary);line-height:1.6}
/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kanban-col{background:var(--bg-secondary);border-radius:var(--radius-lg);padding:16px}
.kanban-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.kanban-count{background:var(--bg-card);padding:2px 8px;border-radius:10px;font-size:11px;color:var(--text-muted)}
.kanban-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;font-size:13px}
.kanban-item:last-child{margin-bottom:0}
.kanban-item .ki-company{font-weight:600;margin-bottom:4px}
.kanban-item .ki-segment{font-size:11px;color:var(--text-muted)}
.kanban-item .ki-score{font-size:11px;color:var(--accent-blue);margin-top:4px}
@media(max-width:1024px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.kanban{grid-template-columns:1fr}}
/* Top 10 threats */
.threat-list-item{display:flex;align-items:center;gap:16px;padding:14px 16px;border-bottom:1px solid var(--border)}
.threat-list-item:last-child{border-bottom:none}
.threat-rank{font-size:20px;font-weight:700;color:var(--text-muted);width:32px;text-align:center}
.threat-info{flex:1}
.threat-name{font-weight:600;font-size:14px}
.threat-desc{font-size:12px;color:var(--text-secondary);margin-top:2px}
</style>
</head>

ach + Therapy Network", "nextStep": "Finalize KPIs, SLAs, pricing", "owner": "Val/Team", "targetDate": "7/1/2026", "notes": "1M+ downloads, 145K MAU, 48% relapse reduction, 93% prediction accuracy"}, {"company": "Lockton", "stage": "Early Qualification", "config": "Total Brain + AI Coach + Therapy Network + Analytics", "nextStep": "Meeting with full wellness buying team early April", "owner": "Rachel/Val", "targetDate": "April 2026", "notes": "Inbound interest, $0.80 PEPM for 13K-employee client, Cognitive Health framing resonated"}, {"company": "LifeStance Health", "stage": "Early Qualification", "config": "AI Scribe + AI Coach + Provider-in-the-Loop + Guardrails/Evals", "nextStep": "Exec alignment target mid-March", "owner": "Val/Team", "targetDate": "March 2026", "notes": "Custom deck prepared, interest in therapist tools + AI coaching"}, {"company": "Flo Health", "stage": "Paused", "config": "Mood screening + AI Coach + Therapy escalation + Psychiatry", "nextStep": "Reactivate when Lontra demos and AI Connect ready", "owner": "Val", "targetDate": "TBD", "notes": "Last contact late 2025"}, {"company": "JAAQ", "stage": "Warm (inbound)", "config": "TBD -- potential sell-into or learn-from", "nextStep": "Discovery call", "owner": "Mark/Val", "targetDate": "TBD", "notes": "UK-based mental health content platform, Mark's YPO connection"}], "pitchFrameworks": [{"segment": "Benefits Consultants/Brokers", "leadWith": "Channel economics: one partnership = hundreds of employer clients. Curated BH solution stack vs evaluating 50 point solutions.", "positioning": "Juno is the recommended behavioral health stack for your employer clients -- AI-powered screening, coaching, therapy, and outcomes in one modular platform.", "keyObjections": "Why not recommend Spring Health or Lyra? / Our clients already have EAPs / How do you prove ROI?", "buyerPersona": "National Practice Leader, Health & Benefits Consulting Leader. Analytics-driven, risk-averse, values thought leadership and data.", "quickPitch": "Your 2026 employer survey shows 35% adding onsite counseling -- but most do not need a counselor onsite, they need a clinical-grade digital BH stack. We built it. One partnership with Juno gives your clients AI screening, coaching, therapy access, and outcomes data in a single integration."}, {"segment": "Women's Health", "leadWith": "BH comorbidity data: 60-70% of menopause patients, high rates in PCOS and fertility. No women's health company has solved this.", "positioning": "White-label behavioral health layer purpose-built for the women's health journey -- perinatal, fertility, menopause. Embeddable, clinically grounded, outcomes-tracked.", "keyObjections": "We already offer some mental health / Our users do not want therapy / We want to build this ourselves", "buyerPersona": "VP Clinical, CMO, VP Product. Clinically credible, data-oriented, looking for scalable solutions that do not require hiring clinicians.", "quickPitch": "Your patients report anxiety, depression, and mood symptoms at 3x the general population rate, but your clinical model stops at prescribing. Our AI Coach provides between-visit behavioral support, Total Brain screens for emotional resilience, and when someone needs a therapist, we route them to one of 16K insurance-covered providers."}, {"segment": "DTC Telehealth", "leadWith": "Mental health subscribers churn because a prescription without support is not enough. AI Coach adds continuous engagement.", "positioning": "The clinical behavioral health layer DTC platforms lack -- AI coaching, clinical escalation, outcomes tracking. Embeddable, white-label, modular.", "keyObjections": "We want to build our own AI / Mental health is not our core focus / What is your evidence?", "buyerPersona": "VP Mental Health Product, CMO, VP Product. Growth-oriented, data-driven, looking for speed to market and engagement metrics.", "quickPitch": "You have millions of subscribers and mental health is your stated growth priority. But a prescription without between-visit support means subscriber churn. Our AI Coach provides clinically grounded conversational support, our AI Scribe saves your providers 15-20 minutes per session, and we have 16K therapists for clinical escalation. Integration takes 2-4 weeks."}, {"segment": "Health Plans/Payors", "leadWith": "Regulatory mandates (CMS 10-day access, network adequacy), margin pressure from BH utilization. AI triage + provider network solves both.", "positioning": "The behavioral health routing and triage layer that sits on top of your existing network and actually gets members into care. AI-powered, insurance-aligned, outcomes-tracked.", "keyObjections": "We already have Carelon/Beacon / HIPAA concerns / How does this work with our existing network?", "buyerPersona": "VP Behavioral Health, CMO, VP Innovation. Regulatory-aware, cost-focused, needs solutions that demonstrate compliance and margin improvement.", "quickPitch": "OIG found most MCOs have less than 50% of county BH workforce in-network. CMS requires 10-day appointment access. Our AI Connect routes members to matched providers from our 16K network as overflow capacity, while our AI Coach handles low-acuity volume at scale. Direct margin relief plus compliance."}, {"segment": "Chronic Disease", "leadWith": "Depression doubles diabetes costs. Emotional eating is the #1 dropout driver. BH comorbidity is proven but no chronic disease company has clinical BH depth.", "positioning": "Clinical-grade behavioral health integrated into your chronic disease management -- not coaching-light, but clinically grounded AI with escalation to therapy.", "keyObjections": "Our coaching handles mental health / Adding BH adds complexity / What evidence do you have?", "buyerPersona": "CMO, VP Product, VP Clinical Operations. Outcomes-obsessed, needs to show integrated results to employers and payors.", "quickPitch": "30% of your diabetes patients have comorbid depression, and they are twice as expensive. Your coaching handles motivation but not clinical anxiety or depression. Our AI Coach provides clinically grounded support, Total Brain predicts which patients will struggle, and when someone needs a therapist, we route them into care. Outcomes-based pricing means we only get paid when it works."}, {"segment": "MSK/Chronic Pain", "leadWith": "Pain catastrophizing is the #1 predictor of poor MSK outcomes. 40-60% comorbid depression. Sword just launched Mind -- your response?", "positioning": "The behavioral health answer to your MSK outcomes gap. Chronic pain anxiety, depression, and catastrophizing interventions that integrate with your PT workflow.", "keyObjections": "Sword Mind covers this / We want to build internally / Our members do not want mental health", "buyerPersona": "Chief Clinical Officer, VP Product. Evidence-driven, competitive, needs to show differentiated outcomes vs Sword.", "quickPitch": "Sword just launched Mind. Your employers are going to ask what your mental health answer is. Pain catastrophizing predicts poor MSK outcomes better than imaging or physical exam. Our AI Coach provides chronic pain-specific anxiety and depression support, and integrated MSK + mental health outcomes data gives your employer story a dimension Sword is still building."}, {"segment": "Data/AI Partners", "leadWith": "BH is the highest-liability domain in consumer health AI. Your models need clinical validation data and safety guardrails you cannot build.", "positioning": "The clinical behavioral health data and guardrails partner for AI companies -- longitudinal therapy outcomes, eval datasets, AI Constitution framework.", "keyObjections": "We can build our own safety framework / We already have health data / Why SonderMind specifically?", "buyerPersona": "VP Health, Head of Safety, Head of Partnerships. Safety-conscious, data-oriented, looking for defensible clinical partnerships.", "quickPitch": "Your health AI users are asking about mental health. BH is your biggest safety risk and biggest data gap. SonderMind has the most valuable longitudinal therapy dataset in the industry -- millions of sessions, validated outcomes, provider feedback loops. Plus an AI Constitution and guardrails framework tested at scale. No one else has this combination."}, {"segment": "Addiction/Recovery", "leadWith": "75% comorbidity. Relapse happens between appointments when patients are alone. 24/7 AI support at the moment of greatest risk.", "positioning": "The between-visit behavioral health layer for addiction treatment -- clinically grounded AI coaching, trigger management, and clinical escalation when needed.", "keyObjections": "Our patients are too complex for AI / We already have peer support / HIPAA concerns", "buyerPersona": "CMO, VP Product, VP Clinical Operations. Clinically conservative, needs safety story, looking for retention improvements.", "quickPitch": "Relapse happens between appointments when your patients are alone with their triggers. Our AI Coach provides 24/7 clinically grounded support at the moment of greatest risk. Clinical data on engagement patterns predicts relapse risk before it happens. And when someone needs clinical escalation, we route them to one of 16K insurance-covered therapists. Integration in 2-4 weeks."}, {"segment": "Care Navigation", "leadWith": "Navigation stops at referral. You find the need but cannot close the loop to care and outcomes. We complete the journey.", "positioning": "The behavioral health care delivery layer that sits behind your navigation -- AI coaching, therapy network, and closed-loop outcomes so you can prove your members actually got better.", "keyObjections": "We already have BH referral pathways / Adding care delivery is not our model / How does this work with our existing partners?", "buyerPersona": "Chief Product Officer, VP Clinical Programs. Growth-oriented, outcomes-focused, looking for differentiation vs Accolade/Included Health.", "quickPitch": "Your navigation finds the behavioral health nee const segmentColors = {
  "Women's Health":"#e85d8a","Chronic Disease":"#f59e0b","MSK/Chronic Pain":"#ef4444",
  "Addiction/Recovery":"#8b5cf6","DTC Telehealth":"#3b82f6","Employers":"#14b8a6",
  "Benefits Consultants/Brokers":"#22c55e","Health Plans/Payors":"#6366f1",
  "Care Navigation":"#f97316","Large Provider Groups":"#06b6d4","University/Institutional":"#a855f7",
  "Data/AI Partners":"#eab308","Wellness/Wearables":"#ec4899","Small-Mid Practices":"#64748b"
};
function getSegmentColor(s){return segmentColors[s]||'#4a9eff'}
function tierBadge(t){return `<span class="badge badge-t${t}">Tier ${t}</span>`}
function statusBadge(s){
  if(s.includes('Pilot')||s.includes('qualification'))return `<span class="badge badge-active">${s}</span>`;
  if(s==='Not contacted')return `<span class="badge badge-prospect">${s}</span>`;
  if(s==='Monitor'||s==='Paused')return `<span class="badge badge-paused">${s}</span>`;
  return `<span class="badge badge-t3">${s}</span>`;
}
function scoreDots(n,max=10){
  let h='';for(let i=1;i<=max;i++) h+=`<span class="score-dot ${i<=n?(n>=8?'high':'filled'):''}"></span>`;
  return `<div class="score-dots">${h}</div>`;
}
function threatBars(n,max=10){
  let h='';for(let i=1;i<=max;i++){
    let cls=i<=n?(n>=8?'filled-high':n>=5?'filled-med':'filled-low'):'';
    h+=`<span class="threat-bar ${cls}"></span>`;
  }return `<div class="threat-meter">${h}</div>`;
}

// ---- State ----
let currentView = 'dashboard';
let sortCol = 'dealPotential';
let sortDir = -1;
let filters = {search:'',segment:'',tier:'',minScore:0,product:''};
let selectedProduct = null;
let expandedRow = null;

// ---- Computed ----
function getSegments(){return [...new Set(DATA.companies.map(c=>c.segment))]}
function getByTier(t){return DATA.companies.filter(c=>c.tier===t)}
function getBySegment(s){return DATA.companies.filter(c=>c.segment===s)}
function filteredCompanies(){
  return DATA.companies.filter(c=>{
    if(filters.search && !c.company.toLowerCase().includes(filters.search.toLowerCase())) return false;
    if(filters.segment && c.segment!==filters.segment) return false;
    if(filters.tier && c.tier!==parseInt(filters.tier)) return false;
    if(filters.minScore && c.dealPotential < filters.minScore) return false;
    if(filters.product && !c.whatWeSell.toLowerCase().includes(filters.product.toLowerCase())) return false;
    return true;
  }).sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(typeof av==='string') return sortDir * av.localeCompare(bv);
    return sortDir * (av-bv);
  });
}
function getProductSegmentMatrix(){
  const segs=getSegments();const prods=DATA.products;
  const matrix=[];
  prods.forEach(p=>{
    const row={product:p.name,category:p.category};
    segs.forEach(s=>{
      const count=DATA.companies.filter(c=>c.segment===s && c.whatWeSell.includes(p.name.split(' (')[0].split(' and ')[0])).length;
      row[s]=count;
    });
    matrix.push(row);
  });
  return matrix;
}

          <div style="font-size:18px;font-weight:600;color:${getSegmentColor(p.segment)}">${p.segment}</div>
          <div style="font-size:12px;color:var(--text-muted)">${segCos.length} companies | ${segCos.filter(c=>c.tier===1).length} Tier 1</div>
        </div>
      </div>
      <div class="pitch-section">
        <div class="pitch-label">Lead With</div>
        <div class="pitch-text">${p.leadWith}</div>
      </div>
      <div class="pitch-section">
        <div class="pitch-label">Positioning</div>
        <div class="pitch-text">${p.positioning}</div>
      </div>
      <div class="pitch-section">
        <div class="pitch-label">Key Objections</div>
        <div class="pitch-text">${p.keyObjections}</div>
      </div>
      <div class="pitch-section">
        <div class="pitch-label">Buyer Persona</div>
        <div class="pitch-text">${p.buyerPersona}</div>

      <div class="pitch-section">
        <div class="pitch-label">Quick Pitch (Ready for Cold Outreach)</div>
        <div class="pitch-quick">${p.quickPitch}</div>
      </div>
    </div>`;
  }).join('')}`;
  return html;
}

// ---- Navigation ----
function switchView(view){
  currentView=view;
  expandedRow=null;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));
  renderView();
}
function renderView(){
  const el=document.getElementById('mainContent');
  switch(currentView){
    case 'dashboard':el.innerHTML=renderDashboard();break;
    case 'market-map':el.innerHTML=renderMarketMap();break;
    case 'competitive':el.innerHTML=renderCompetitive();break;
    case 'products':el.innerHTML=renderProducts();break;
    case 'pitches':el.innerHTML=renderPitches();break;
    case 'pipeline':el.innerHTML=renderPipeline();break;
  }
}
function toggleSort(col){
  if(sortCol===col) sortDir*=-1;
  else{sortCol=col;sortDir=-1}
  renderView();
}
function toggleExpand(i){
  expandedRow=expandedRow===i?null:i;
  renderView();
}
function navigateToSegment(seg){
  filters.segment=seg;
  switchView('market-map');
}

// ---- Init ----
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>switchView(t.dataset.view)));
renderView();
</script>
